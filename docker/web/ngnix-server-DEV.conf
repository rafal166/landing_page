server {
    listen 80;
    server_name _;
    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;

    location /api {
        try_files $uri /index.php$is_args$args;
    }

    # Hashowane assety (JS/CSS) — nazwa pliku zmienia się przy zmianie treści, więc cache na długo
    location /assets/ {
        root /var/www/frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
       autoindex on;
       root  /var/www/frontend;
       try_files $uri /index.html =404;
       index index.html;
       # index.html i pliki niehashowane — zawsze rewalidacja, by przeglądarka nie trzymała starego widoku
       add_header Cache-Control "no-cache";
    }
}
